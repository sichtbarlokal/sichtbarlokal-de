[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/ki-analyse-tool"
  to = "/ki-analyse-tool/index.html"
  status = 200

[[redirects]]
  from = "/ki-analyse-tool/*"
  to = "/ki-analyse-tool/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
